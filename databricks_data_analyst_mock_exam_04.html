ario": "A user accidentally overwrote a Delta table with incorrect data an hour ago.", "question": "What is the FASTEST way to restore correct data?", "options": ["A. Run VACUUM immediately", "B. Use Delta Time Travel to query/restore a previous version", "C. Rebuild the table from scratch without history", "D. Delete the warehouse cache"], "correct": "B", "explanation": "Time Travel enables accessing prior versions for recovery (until vacuum retention removes files)."}, {"domain": "Managing Data", "objective": "Performance Metadata", "scenario": "You want the optimizer to choose better join strategies by having accurate table statistics.", "question": "Which command is MOST relevant?", "options": ["A. ANALYZE TABLE COMPUTE STATISTICS", "B. SHOW GRANTS", "C. DESCRIBE HISTORY", "D. REFRESH TABLE"], "correct": "A", "explanation": "Computing statistics helps the optimizer estimate cardinalities and costs."}, {"domain": "Managing Data", "objective": "Lifecycle", "scenario": "Storage costs are rising; you need to remove old unneeded files safely from a Delta table after ensuring rollback is not required beyond 14 days.", "question": "Which combination is MOST appropriate?", "options": ["A. VACUUM with a retention period aligned to policy", "B. OPTIMIZE with ZORDER", "C. CREATE OR REPLACE VIEW", "D. CACHE TABLE"], "correct": "A", "explanation": "VACUUM removes old files; retention should follow data recovery and compliance requirements."}, {"domain": "Importing Data", "objective": "Incremental Ingestion", "scenario": "New JSON files land hourly in cloud object storage. You want idempotent incremental loading into a Delta table using SQL.", "question": "Which option is BEST?", "options": ["A. COPY INTO with file tracking into a Delta table", "B. INSERT INTO from a manual file upload each hour", "C. CREATE TABLE AS SELECT reading only the latest folder, overwriting each run", "D. Export the JSON to CSV first"], "correct": "A", "explanation": "COPY INTO can track previously efresh"], "correct": "A", "explanation": "Broadcast joins can avoid large shuffles when one side is small."}, {"domain": "Analysing Queries", "objective": "Predicate Pushdown", "scenario": "A query filters on a partition column but still scans many files.", "question": "Which is the MOST likely cause?", "options": ["A. The filter is applied after an expensive join and cannot prune early", "B. The query uses COUNT(*)", "C. The warehouse has Photon enabled", "D. The table is a view"], "correct": "A", "explanation": "Filter placement can prevent pruning; pushing predicates earlier helps reduce scanned data."}, {"domain": "Analysing Queries", "objective": "Data Skipping", "scenario": "You frequently filter by event_date and customer_id but see high file scan counts.", "question": "What is the BEST improvement?", "options": ["A. OPTIMIZE with ZORDER on (event_date, customer_id)", "B. VACUUM with zero retention", "C. Use SELECT * always", "D. Disable statistics"], "correct": "A", "explanation": "ZORDER improves data skipping for the columns frequently used in predicates."}, {"domain": "Analysing Queries", "objective": "Caching Semantics", "scenario": "Users complain they sometimes see older results immediately after data updates.", "question": "Which feature MOST directly explains this behavior?", "options": ["A. Result cache serving prior query results", "B. VACUUM removing new files", "C. Unity Catalog revoking permissions", "D. ZORDER causing stale data"], "correct": "A", "explanation": "Result cache can return cached results depending on cache rules and data change detection."}, {"domain": "Analysing Queries", "objective": "Explain Plan", "scenario": "You need to validate whether the optimizer is using a broadcast join.", "question": "What should you use?", "options": ["A. EXPLAIN or query profile to inspect the physical plan", "B. SHOW GRANTS", "C. DESCRIBE DATABASE", "D. VACUUM"], "correct": "A", "explanation": "EXPLAIN / profile reveals the physical plan including     try {
      const s = JSON.parse(raw);
      answers = s.answers || answers;
      flagged = s.flagged || flagged;
      reviewed = s.reviewed || reviewed;
      timeRemaining = typeof s.timeRemaining === "number" ? s.timeRemaining : timeRemaining;
      idx = typeof s.idx === "number" ? Math.min(Math.max(s.idx,0), QUESTIONS.length-1) : idx;
    } catch(e) {}
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({answers, flagged, reviewed, timeRemaining, idx}));
  }
  function fmtTime(s) {
    const m = Math.floor(s/60), sec = s%60;
    return m + ":" + (sec<10 ? "0"+sec : sec);
  }
  const timerEl = document.getElementById("timer");
  function startTimer() {
    timerEl.textContent = fmtTime(timeRemaining);
    setInterval(() => {
      timeRemaining = Math.max(0, timeRemaining-1);
      timerEl.textContent = fmtTime(timeRemaining);
      if (timeRemaining % 5 === 0) saveState();
      if (timeRemaining === 0) submitExam();
    }, 1000);
  }

  function buildNav() {
    const nav = document.getElementById("nav");
    nav.innerHTML = "";
    for (let i=0;i<QUESTIONS.length;i++) {
      const b = document.createElement("button");
      b.textContent = (i+1);
      b.addEventListener("click", ()=>{ idx=i; render(); });
      nav.appendChild(b);
    }
  }
  function updateNav() {
    const buttons = document.querySelectorAll("#nav button");
    buttons.forEach((b,i)=>{
      b.classList.toggle("current", i===idx);
      b.classList.toggle("answered", !!answers[i]);
      b.classList.toggle("flagged", !!flagged[i]);
    });
    document.getElementById("flagHint").textContent = flagged[idx] ? "This question is flagged." : "";
  }

  function hideFeedback() {
    const fb = document.getElementById("feedback");
    fb.style.display = "none";
    fb.className = "feedback";
    fb.innerHTML = "";
  }
  function showFeedback() {
    const q = QUESTIONS[idx];
    const fb = document.getElementById("feedback");
    const a = answers[idx];
    fb.style.display = "block";
    if (!a) {
      fb.className = "feedback";
      fb.innerHTML = "Select an answer first.";
      return;
    }
    if (a === q.correct) {
      fb.className = "feedback ok";
      fb.innerHTML = `<strong>Correct ✅</strong><br><div class="muted" style="margin-top:6px;">${q.explanation}</div>`;
    } else {
      fb.className = "feedback bad";
      fb.innerHTML = `<strong>Incorrect ❌</strong><br>Correct answer: <strong>${q.correct}</strong><br><div class="muted" style="margin-top:6px;">${q.explanation}</div>`;
    }
  }

  function render() {
    const q = QUESTIONS[idx];
    document.getElementById("qCount").textContent = `Question ${idx+1} / ${QUESTIONS.length}`;
    document.getElementById("domainTag").textContent = q.domain;
    document.getElementById("objectiveTag").textContent = `Objective: ${q.objective}`;
    document.getElementById("scenario").innerHTML = `<strong>Scenario:</strong> ${q.scenario}`;
    document.getElementById("question").textContent = q.question;

    const opts = document.getElementById("options");
    opts.innerHTML = "";
    q.options.forEach(line => {
      const letter = line.trim().charAt(0);
      const label = document.createElement("label");
      label.innerHTML = `<input type="radio" name="opt" value="${letter}"> ${line}`;
      const input = label.querySelector("input");
      input.checked = (answers[idx] === letter);
      input.addEventListener("change", ()=>{
        answers[idx] = letter;
        saveState();
        updateNav();
        if (!reviewed[idx]) hideFeedback();
      });
      opts.appendChild(label);
    });

    if (reviewed[idx]) showFeedback(); else hideFeedback();
    updateNav();
    saveState();
  }

  document.getElementById("prevBtn").addEventListener("click", ()=>{ if(idx>0) idx--; render(); });
  document.getElementById("nextBtn").addEventListener("click", ()=>{ if(idx<QUESTIONS.length-1) idx++; render(); });
  document.getElementById("flagBtn").addEventListener("click", ()=>{ flagged[idx]=!flagged[idx]; saveState(); updateNav(); });
  document.getElementById("reviewBtn").addEventListener("click", ()=>{ reviewed[idx]=true; saveState(); showFeedback(); });
  document.getElementById("clearBtn").addEventListener("click", ()=>{ delete answers[idx]; delete reviewed[idx]; saveState(); render(); });

  function submitExam() {
    let score=0;
    const domainTotals={}, domainCorrect={};
    QUESTIONS.forEach((q,i)=>{
      domainTotals[q.domain]=(domainTotals[q.domain]||0)+1;
      domainCorrect[q.domain]=(domainCorrect[q.domain]||0);
      if (answers[i]===q.correct) { score++; domainCorrect[q.domain]++; }
    });
    const res=document.getElementById("results");
    res.style.display="block";
    document.getElementById("scoreLine").textContent =
      `Score: ${score} / ${QUESTIONS.length} (${Math.round((score/QUESTIONS.length)*100)}%)`;

    const breakdown=document.getElementById("breakdown");
    breakdown.innerHTML="";
    Object.keys(domainTotals).forEach(d=>{
      const total=domainTotals[d], corr=domainCorrect[d]||0;
      const pct=Math.round((corr/total)*100);
      const row=document.createElement("div");
      row.style.marginTop="10px";
      row.innerHTML=`
        <div style="display:flex; justify-content:space-between; gap:10px;">
          <div style="font-weight:800;">${d}</div>
          <div class="muted">${corr}/${total} (${pct}%)</div>
        </div>
        <div class="bar"><div style="width:${pct}%;"></div></div>
      `;
      breakdown.appendChild(row);
    });
    saveState();
  }
  document.getElementById("submitBtn").addEventListener("click", submitExam);

  document.getElementById("resetBtn").addEventListener("click", ()=>{
    localStorage.removeItem(STORAGE_KEY);
    answers={}; flagged={}; reviewed={}; timeRemaining=90*60; idx=0;
    timerEl.textContent="90:00";
    buildNav();
    render();
  });

  loadState();
  buildNav();
  render();
  startTimer();
} catch (e) {
  document.getElementById("errorBanner").style.display="block";
  console.error(e);
}
</script>
</body>
</html>
